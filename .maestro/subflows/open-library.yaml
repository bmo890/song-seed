# Reusable: cold-launch the app and land on the library root with the "Ideas"
# starter collection visible. Dismisses the backup-reminder dialog and the dev
# LogBox banner (both are stateful and would otherwise block later steps).
appId: com.bmostudio.songseed.dev
---
- launchApp:
    stopApp: true
- runFlow:
    when:
      visible: ".*Back up your library.*"
    commands:
      - tapOn: "Later"
- extendedWaitUntil:
    visible: ".*Ideas.*"
    timeout: 60000
- runFlow:
    when:
      visible: ".*Open debugger.*"
    commands:
      - tapOn:
          point: "92%,93%"
