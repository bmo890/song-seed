# Editor Cut/trim: mark a region, switch to Cut mode (removes the region), and
# save the trimmed clip. Distinct from Extract (which keeps a region) — Cut removes
# it. Verifies the trim produces a shorter clip. Self-cleaning. Requires push-dev-samples.
appId: com.bmostudio.songseed.dev
---
- runFlow: ../subflows/open-library.yaml
- tapOn: ".*Ideas.*"
- extendedWaitUntil:
    visible:
      id: "fab-record"
    timeout: 15000
- runFlow: reset-clips.yaml
- runFlow: ../subflows/dismiss-logbox.yaml
- tapOn:
    id: "fab-create"
- waitForAnimationToEnd
- tapOn:
    id: "fab-menu-devsamples"
- extendedWaitUntil:
    visible: ".*sample-01.*"
    timeout: 20000
- tapOn: ".*sample-01.*"
- extendedWaitUntil:
    visible: "More options"
    timeout: 10000
- tapOn: "More options"
- extendedWaitUntil:
    visible: "Edit clip"
    timeout: 5000
- tapOn: "Edit clip"
- extendedWaitUntil:
    visible: ".*Add at playhead.*"
    timeout: 10000
# Mark a region, then switch to Cut mode (region is removed / clip trimmed).
- tapOn: ".*Add at playhead.*"
- extendedWaitUntil:
    visible: ".*Extract 1 clip.*"
    timeout: 8000
- tapOn: ".*Cut"
- extendedWaitUntil:
    visible: ".*trimmed clip.*"
    timeout: 5000
# Save the trim → confirm sheet → Save Splice.
- tapOn: ".*Save trimmed clip.*"
- extendedWaitUntil:
    visible: "Save Splice"
    timeout: 8000
- tapOn: "Save Splice"
# Back on the player — the trimmed clip (~33s, 5s removed from 38s) now exists.
- extendedWaitUntil:
    visible: ".*00:33.*"
    timeout: 10000
- runFlow:
    when:
      visible: "Minimize player"
    commands:
      - tapOn: "Minimize player"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "fab-record"
    timeout: 10000
# Clean up.
- longPressOn: ".*sample-0.*"
- extendedWaitUntil:
    visible: "Select all"
    timeout: 5000
- tapOn: "Select all"
- tapOn: ".*Delete"
- extendedWaitUntil:
    visible: ".*Delete selected items.*"
    timeout: 5000
- tapOn:
    id: "dialog-btn-delete"
- extendedWaitUntil:
    notVisible: ".*sample-0.*"
    timeout: 8000
