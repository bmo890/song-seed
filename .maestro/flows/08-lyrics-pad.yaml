# Lyrics Pad note editing + autosave. Robust to both landing states: with no
# existing notes the pad opens straight into a blank editor; with notes it opens
# the index (tap "New Page" to get an editor). We type a line, confirm it renders
# (autosaved into the note), then clear it so the flow leaves an empty page.
# Exercises the notepad editor text input and autosave.
appId: com.bmostudio.songnook.dev
---
- runFlow: ../subflows/open-library.yaml
- tapOn:
    id: "header-menu"
- waitForAnimationToEnd
- tapOn:
    id: "nav-row-lyrics-pad"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Lyrics Pad.*"
    timeout: 10000
# If we landed on the notes index (notes already exist), open a page editor.
# If we landed straight in the editor (no notes yet), this is skipped.
- runFlow:
    when:
      visible: ".*New Page.*"
    commands:
      - tapOn: ".*New Page.*"
# Editor is open — "Word finder" is always present here (unlike the "Start writing…"
# placeholder, which only shows while the body is empty).
- extendedWaitUntil:
    visible: ".*Word finder.*"
    timeout: 10000
# Focus the empty body and type a line, then dismiss the keyboard via the date.
- tapOn: ".*Start writing.*"
- inputText: "Maestro lyric line"
- tapOn: ".*JUL 2026.*"
- assertVisible: ".*Maestro lyric line.*"
# Clean up: clear the line, leaving an empty page (no residue).
- tapOn: ".*Maestro lyric line.*"
- eraseText: 40
- tapOn: ".*JUL 2026.*"
