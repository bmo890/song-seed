# Drawer navigation: each drawer destination opens and renders. Relaunches between
# destinations so every drawer-open starts from the known-good Ideas screen (the
# drawer opens via the header-menu testID. RN rows expose composite labels
# (", Lyrics Pad") so use .*X.* regexes. A backup-reminder dialog can appear on launch
# once the library has content — dismissed with a guarded "Later" tap.
appId: com.bmostudio.songseed.dev
---
- launchApp:
    stopApp: true
- runFlow:
    when:
      visible: ".*Back up your library.*"
    commands:
      - tapOn: "Later"
- extendedWaitUntil:
    visible: ".*Ideas.*"
    timeout: 60000
- runFlow:
    when:
      visible: ".*Open debugger.*"
    commands:
      - tapOn:
          point: 92%,93%
- tapOn:
    id: "header-menu"
- extendedWaitUntil:
    visible: ".*Lyrics Pad.*"
    timeout: 5000
- waitForAnimationToEnd
- tapOn: ".*Lyrics Pad.*"
- extendedWaitUntil:
    visible: ".*([Ll]yrics|[Nn]ote).*"
    timeout: 10000

- launchApp:
    stopApp: true
- runFlow:
    when:
      visible: ".*Back up your library.*"
    commands:
      - tapOn: "Later"
- extendedWaitUntil:
    visible: ".*Ideas.*"
    timeout: 60000
- runFlow:
    when:
      visible: ".*Open debugger.*"
    commands:
      - tapOn:
          point: 92%,93%
- tapOn:
    id: "header-menu"
- extendedWaitUntil:
    visible: ".*Metronome.*"
    timeout: 5000
- waitForAnimationToEnd
- tapOn: ".*Metronome.*"
- extendedWaitUntil:
    visible: ".*([Bb]pm|BPM|[Tt]empo).*"
    timeout: 10000

- launchApp:
    stopApp: true
- runFlow:
    when:
      visible: ".*Back up your library.*"
    commands:
      - tapOn: "Later"
- extendedWaitUntil:
    visible: ".*Ideas.*"
    timeout: 60000
- runFlow:
    when:
      visible: ".*Open debugger.*"
    commands:
      - tapOn:
          point: 92%,93%
- tapOn:
    id: "header-menu"
- extendedWaitUntil:
    visible: ".*Settings.*"
    timeout: 5000
- waitForAnimationToEnd
- tapOn: ".*Settings.*"
- extendedWaitUntil:
    visible: ".*Songstead Pro.*"
    timeout: 10000
- assertVisible: ".*Startup.*"
